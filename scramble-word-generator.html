<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scramble Word Generator</title>
  <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }

    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 1.25rem; }

    /* ── Mode tabs ── */
    .mode-tabs {
      display: flex;
      gap: 0.5rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 0.35rem;
      margin-bottom: 1.5rem;
    }

    .mode-tab {
      background: transparent;
      border: none;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .mode-tab:hover { color: #e2e8f0; }
    .mode-tab.active {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #0f172a;
    }

    .mode-panel { display: none; width: 100%; max-width: 640px; }
    .mode-panel.active { display: block; }

    /* ── Shared card ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 1.75rem;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .btn {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 0.6rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: #334155;
      color: #94a3b8;
    }

    .loader {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    @keyframes flip {
      0%   { transform: rotateX(0); }
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0); }
    }

    /* ═══════════════════════════════════════════
       SCRAMBLE MODE
    ═══════════════════════════════════════════ */
    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .letter-input {
      flex: 1;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 0.6rem;
      padding: 0.75rem 1rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #f0f9ff;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }

    .letter-input:focus { border-color: #38bdf8; }
    .letter-input::placeholder { color: #334155; font-weight: 400; letter-spacing: 0.05em; font-size: 1rem; }

    .btn-clear { background: #334155; color: #94a3b8; padding: 0.75rem 0.9rem; font-size: 1.1rem; }

    .char-tiles {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
      min-height: 2.5rem;
    }

    .tile {
      background: linear-gradient(135deg, #1d4ed8, #6d28d9);
      border-radius: 0.4rem;
      width: 2.4rem;
      height: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      animation: pop 0.15s ease;
    }

    .tile-qu { width: 3.6rem; font-size: 0.95rem; }

    .status-bar { margin-top: 1rem; font-size: 0.85rem; color: #64748b; min-height: 1.2em; }
    .status-bar .highlight { color: #38bdf8; font-weight: 600; }
    .error-msg { color: #f87171; font-size: 0.82rem; margin-top: 0.4rem; }

    /* Results */
    .results-wrapper { width: 100%; max-width: 640px; margin-top: 1.5rem; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .results-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .total-badge {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.8rem;
      color: #38bdf8;
      font-weight: 700;
    }

    .filter-bar { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.85rem; }

    .filter-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: #64748b; color: #e2e8f0; }
    .filter-btn.active { color: #fff; border-color: transparent; }

    .cat-tag {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 700;
      padding: 0.1rem 0.3rem;
      border-radius: 0.2rem;
      margin-left: 0.3rem;
      vertical-align: middle;
      letter-spacing: 0.02em;
      opacity: 0.9;
    }

    .length-group {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .length-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      background: #0f172a;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .length-header:hover { background: #172033; }
    .length-label { font-weight: 700; font-size: 0.9rem; color: #818cf8; }
    .length-count { font-size: 0.78rem; color: #64748b; }
    .chevron { font-size: 0.7rem; color: #475569; transition: transform 0.2s; }
    .length-group.collapsed .chevron { transform: rotate(-90deg); }
    .length-group.collapsed .word-grid { display: none; }

    .word-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem 1rem; }

    .word-chip {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.4rem;
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #cbd5e1;
      letter-spacing: 0.04em;
      transition: border-color 0.15s, color 0.15s;
      cursor: default;
      display: flex;
      align-items: center;
    }

    .word-chip:hover { border-color: #818cf8; color: #a5b4fc; }

    .empty-state { text-align: center; padding: 2rem; color: #475569; font-size: 0.9rem; }

    /* ═══════════════════════════════════════════
       WORD GUESS MODE (Wordle)
    ═══════════════════════════════════════════ */
    .wg-grid {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .wg-row {
      display: flex;
      gap: 0.4rem;
    }

    .wg-cell {
      width: 3rem;
      height: 3rem;
      border: 2px solid #334155;
      border-radius: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 800;
      color: #f0f9ff;
      text-transform: uppercase;
      transition: border-color 0.1s;
      perspective: 250px;
    }

    .wg-cell.filled { border-color: #64748b; animation: pop 0.1s ease; }
    .wg-cell.correct { background: #15803d; border-color: #15803d; animation: flip 0.4s ease; }
    .wg-cell.present { background: #b45309; border-color: #b45309; animation: flip 0.4s ease; }
    .wg-cell.absent  { background: #334155; border-color: #334155; animation: flip 0.4s ease; }

    .wg-row.shake { animation: shake 0.4s ease; }

    .wg-input-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .wg-input {
      flex: 1;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 0.6rem;
      padding: 0.7rem 1rem;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: #f0f9ff;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
    }

    .wg-input:focus { border-color: #38bdf8; }

    .wg-message {
      text-align: center;
      font-size: 0.9rem;
      font-weight: 700;
      min-height: 1.5em;
      margin-bottom: 0.5rem;
    }

    .wg-message.win  { color: #4ade80; }
    .wg-message.lose { color: #f87171; }
    .wg-message.info { color: #fbbf24; }

    .wg-legend {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .wg-legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: #64748b;
    }

    .wg-legend-dot {
      width: 0.9rem;
      height: 0.9rem;
      border-radius: 0.2rem;
    }

    /* ═══════════════════════════════════════════
       LETTER BLOCKS MODE
    ═══════════════════════════════════════════ */
    .lb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .lb-score {
      font-size: 1.1rem;
      font-weight: 800;
      color: #38bdf8;
    }

    .lb-score span { font-size: 0.75rem; color: #64748b; font-weight: 600; }

    .lb-tiles {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .lb-tile {
      aspect-ratio: 1;
      background: linear-gradient(135deg, #1d4ed8, #6d28d9);
      border-radius: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: opacity 0.3s, transform 0.3s;
      user-select: none;
    }

    .lb-tile.used {
      opacity: 0.2;
      transform: scale(0.9);
      background: #334155;
      box-shadow: none;
    }

    .lb-tile.qu { font-size: 0.78rem; }

    .lb-input-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .lb-input {
      flex: 1;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 0.6rem;
      padding: 0.65rem 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #f0f9ff;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }

    .lb-input:focus { border-color: #38bdf8; }

    .lb-message {
      font-size: 0.85rem;
      font-weight: 700;
      min-height: 1.3em;
      margin-bottom: 0.5rem;
    }

    .lb-message.good { color: #4ade80; }
    .lb-message.bad  { color: #f87171; }

    .lb-found {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .lb-word-chip {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.4rem;
      padding: 0.25rem 0.55rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      animation: pop 0.2s ease;
    }

    .lb-pts {
      font-size: 0.65rem;
      color: #38bdf8;
      font-weight: 700;
    }

    /* ── Footer ── */
    footer { margin-top: 2rem; color: #334155; font-size: 0.75rem; text-align: center; }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      body { padding: 1.25rem 0.75rem 2rem; }
      h1 { font-size: 1.5rem; }
      .subtitle { margin-bottom: 1rem; }
      .mode-tab { padding: 0.45rem 0.65rem; font-size: 0.78rem; }
      .card { padding: 1rem; }

      /* Scramble */
      .input-row { flex-wrap: wrap; }
      .letter-input { order: 1; font-size: 1.2rem; padding: 0.65rem 0.75rem; }
      .btn-clear { order: 2; }
      #findBtn { order: 3; width: 100%; padding: 0.8rem; font-size: 1rem; }
      .tile { width: 2rem; height: 2rem; font-size: 0.95rem; }
      .tile-qu { width: 3rem; font-size: 0.78rem; }
      .results-wrapper { margin-top: 1rem; }
      .word-chip { font-size: 0.9rem; padding: 0.35rem 0.65rem; }

      /* Word Guess */
      .wg-cell { width: 2.6rem; height: 2.6rem; font-size: 1.1rem; }

      /* Letter Blocks */
      .lb-tile { font-size: 0.95rem; }
    }

    /* ── Scan modal ── */
    .scan-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .scan-overlay.open { display: flex; }

    .scan-modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .scan-modal h3 { font-size: 1rem; font-weight: 700; color: #94a3b8; }

    .scan-preview {
      width: 100%;
      max-height: 240px;
      object-fit: contain;
      border-radius: 0.5rem;
      border: 1px solid #334155;
      display: none;
    }

    .scan-preview.show { display: block; }

    .scan-status { font-size: 0.85rem; color: #64748b; min-height: 1.2em; }
    .scan-status.ok  { color: #4ade80; }
    .scan-status.err { color: #f87171; }

    .scan-letters {
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 0.6rem;
      padding: 0.65rem 1rem;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #f0f9ff;
      text-transform: uppercase;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .scan-letters:focus { border-color: #38bdf8; }

    .scan-actions { display: flex; gap: 0.6rem; }
    .scan-actions .btn { flex: 1; }

    .btn-cam {
      background: #334155;
      color: #94a3b8;
      border: none;
      border-radius: 0.6rem;
      padding: 0.65rem 0.9rem;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
      line-height: 1;
    }
    .btn-cam:hover { background: #475569; color: #e2e8f0; }

    /* ── Hint / Suggest panels ── */
    .wg-hint-panel {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.6rem;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      display: none;
      flex-direction: column;
      gap: 0.3rem;
      align-items: center;
    }
    .wg-hint-panel.show { display: flex; }
    .wg-hint-count { font-size: 0.78rem; color: #64748b; }
    .wg-hint-word  { font-size: 1.2rem; font-weight: 800; color: #38bdf8; letter-spacing: 0.15em; }

    .lb-suggest-panel {
      margin-top: 1rem;
      display: none;
    }
    .lb-suggest-panel.show { display: block; }
    .lb-suggest-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .lb-suggest-header span { font-size: 0.78rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .lb-suggest-close { background: none; border: none; color: #475569; cursor: pointer; font-size: 1rem; padding: 0; }
    .lb-suggest-close:hover { color: #94a3b8; }
    .lb-suggest-groups { display: flex; flex-direction: column; gap: 0.4rem; max-height: 260px; overflow-y: auto; }
    .lb-suggest-row { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
    .lb-suggest-len { font-size: 0.7rem; font-weight: 700; color: #818cf8; min-width: 1.8rem; }
    .lb-suggest-chip {
      background: #0f172a;
      border: 1px solid #2d3f55;
      border-radius: 0.3rem;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }
    .lb-suggest-chip:hover { border-color: #38bdf8; color: #e2e8f0; }
  </style>
</head>
<body>

<h1>SCRAMBLE</h1>
<p class="subtitle">Bookworm Adventures word tools</p>

<!-- Mode tabs -->
<div class="mode-tabs">
  <button class="mode-tab active" data-mode="scramble">Scramble</button>
  <button class="mode-tab" data-mode="wordguess">Word Guess</button>
  <button class="mode-tab" data-mode="letterblocks">Letter Blocks</button>
</div>

<!-- Loading bar (shared) -->
<div id="globalLoader" class="loader" style="margin-bottom:1rem;">
  <div class="spinner"></div>
  <span>Loading word list…</span>
</div>

<!-- ═══════════════════ SCRAMBLE MODE ═══════════════════ -->
<div id="mode-scramble" class="mode-panel active">
  <div class="card">
    <div class="input-row">
      <input id="letterInput" class="letter-input" type="text" maxlength="16"
        placeholder="Enter up to 16 letters…" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn" id="findBtn" disabled>Find Words</button>
      <button class="btn btn-clear" id="clearBtn" title="Clear">✕</button>
      <button class="btn-cam" id="scrScan" title="Scan letters">📷</button>
    </div>
    <div class="char-tiles" id="tiles"></div>
    <div id="errorMsg" class="error-msg"></div>
    <div class="status-bar">
      <span id="statusText">Loading word list…</span>
    </div>
  </div>

  <div class="results-wrapper" id="resultsWrapper" style="display:none;">
    <div class="results-header">
      <h2>Found Words</h2>
      <span class="total-badge" id="totalBadge">0 words</span>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div id="resultsContainer"></div>
  </div>
</div>

<!-- ═══════════════════ WORD GUESS MODE ═══════════════════ -->
<div id="mode-wordguess" class="mode-panel">
  <div class="card">
    <div class="wg-grid" id="wgGrid"></div>
    <div class="wg-message" id="wgMessage"></div>
    <div class="wg-input-row">
      <input id="wgInput" class="wg-input" type="text" maxlength="5"
        placeholder="Guess…" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn" id="wgSubmit" disabled>Guess</button>
    </div>
    <div style="display:flex;gap:0.5rem;justify-content:center;">
      <button class="btn btn-secondary" id="wgHintBtn" disabled>Hint</button>
      <button class="btn btn-secondary" id="wgNew" disabled>New Word</button>
    </div>
    <div class="wg-hint-panel" id="wgHintPanel">
      <div class="wg-hint-count" id="wgHintCount"></div>
      <div class="wg-hint-word"  id="wgHintWord"></div>
    </div>
    <div class="wg-legend">
      <div class="wg-legend-item"><div class="wg-legend-dot" style="background:#15803d"></div>Right spot</div>
      <div class="wg-legend-item"><div class="wg-legend-dot" style="background:#b45309"></div>Wrong spot</div>
      <div class="wg-legend-item"><div class="wg-legend-dot" style="background:#334155"></div>Not in word</div>
    </div>
  </div>
</div>

<!-- ═══════════════════ LETTER BLOCKS MODE ═══════════════════ -->
<div id="mode-letterblocks" class="mode-panel">
  <div class="card">
    <div class="lb-header">
      <div class="lb-score" id="lbScore">0 <span>pts</span></div>
      <div style="display:flex;gap:0.5rem;">
        <button class="btn-cam" id="lbScan" title="Scan tiles">📷</button>
        <button class="btn btn-secondary" id="lbNew" disabled>New Tiles</button>
      </div>
    </div>
    <div class="lb-tiles" id="lbTiles"></div>
    <div class="lb-input-row">
      <input id="lbInput" class="lb-input" type="text"
        placeholder="Spell a word…" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn" id="lbSubmit" disabled>Spell</button>
      <button class="btn btn-secondary" id="lbSuggestBtn" disabled title="Show possible words">💡</button>

    <div class="lb-suggest-panel" id="lbSuggestPanel">

</div>

<input type="file" id="scrCamInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="lbCamInput"  accept="image/*" capture="environment" style="display:none">

<div class="scan-overlay" id="scanOverlay">

    <div class="scan-status" id="scanStatus">Choose an image to scan.</div>

      autocomplete="off" autocorrect="off" spellcheck="false" />

      <button class="btn btn-secondary" id="scanCancel">Cancel</button>
      <button class="btn" id="scanApply">Apply</button>

</div>

<script>
  // ═══════════════════════════════════════════════════════════
  //  SHARED: word list + categories
  // ═══════════════════════════════════════════════════════════
  let wordList   = null;
  let wordSet    = null;

  const CATEGORIES = {
    'Metals':     { color: '#475569', text: '#e2e8f0', words: new Set(['gold','silver','iron','steel','copper','bronze','tin','lead','zinc','nickel','cobalt','chrome','brass','pewter','platinum','titanium','alloy','ore','rust','foil','nail','bolt','rivet','ingot','solder','mercury','barium','radium','iridium','osmium','bismuth','indium','gallium','cesium','hafnium','metal','metallic']) },
    'Gems':       { color: '#7e22ce', text: '#ede9fe', words: new Set(['ruby','diamond','emerald','sapphire','topaz','opal','pearl','garnet','amber','jade','crystal','gem','jewel','agate','onyx','beryl','amethyst','quartz','zircon','spinel','peridot','citrine','jasper','moonstone','aquamarine','gems','jewels','gemstone']) },
    'Feline':     { color: '#92400e', text: '#fef3c7', words: new Set(['cat','cats','kitten','kitty','tabby','calico','tom','tomcat','lion','tiger','leopard','panther','cheetah','jaguar','puma','cougar','lynx','bobcat','ocelot','serval','caracal','margay','oncilla','jaguarundi','manul','wildcat','liger','tigon','claw','claws','purr','mew','meow','feline','felid','feral']) },
    'Animals':    { color: '#15803d', text: '#dcfce7', words: new Set(['dog','bird','fish','bear','wolf','eagle','snake','deer','fox','owl','crow','rat','bat','ant','bee','fly','bug','crab','frog','toad','duck','hen','cow','pig','ram','ewe','elk','ape','asp','eel','cod','colt','mare','boar','bull','stag','swan','hawk','wren','dove','mole','vole','newt','wasp','moth','lark','seal','worm','slug','clam','snail','hare','puma','bison','moose','raven','crane','finch','robin','quail','trout','perch','shark','whale','squid','beetle','spider','lizard','turtle','parrot','monkey','rabbit','donkey','horse','zebra','giraffe','dolphin','penguin','ostrich','peacock','vulture','sparrow','swallow','pigeon','falcon','cobra','viper','python','gecko','iguana','ferret','badger','otter','beaver','weasel','skunk','raccoon']) },
    'Colors':     { color: '#b45309', text: '#fef3c7', words: new Set(['red','blue','green','yellow','orange','purple','pink','black','white','gray','grey','brown','cyan','teal','violet','indigo','scarlet','crimson','azure','ivory','ebony','tan','rose','coral','mauve','beige','cream','navy','olive','tawny','auburn','ochre','sienna','umber','khaki','lilac','maroon','magenta','turquoise','lavender','vermilion','cerulean','fuchsia','chartreuse']) },
    'Weapons':    { color: '#b91c1c', text: '#fee2e2', words: new Set(['sword','blade','axe','bow','spear','lance','mace','dagger','knife','staff','club','dart','arrow','sling','whip','flail','pike','halberd','rapier','saber','scythe','trident','javelin','glaive','cleaver','cutlass','falchion','sickle','baton','cudgel','stiletto','dirk','machete','katana','shuriken','kunai','tomahawk','hatchet','warhammer','maul','cannon','pistol','musket','rifle','shield','buckler']) },
    'Food':       { color: '#c2410c', text: '#fff7ed', words: new Set(['bread','meat','cake','pie','rice','corn','bean','pea','nut','egg','milk','ale','wine','salt','herb','root','fruit','berry','plum','pear','lime','fig','date','oat','rye','tart','stew','soup','broth','cream','butter','honey','jam','ham','beef','pork','lamb','lard','flour','yeast','sugar','syrup','sauce','gravy','spice','pepper','ginger','garlic','onion','leek','carrot','celery','parsley','basil','thyme','sage','mint','dill','cumin','apple','grape','lemon','mango','peach','melon','cherry','prawn','shrimp','oyster','mussel','pasta','noodle','biscuit','cracker','candy','toffee','fudge','caramel','chocolate','vanilla','custard','pudding','jelly','yogurt','cheese','bacon','sausage']) },
    'Body Parts': { color: '#1d4ed8', text: '#dbeafe', words: new Set(['arm','leg','head','hand','foot','eye','ear','nose','lip','rib','hip','jaw','toe','shin','knee','back','neck','heel','palm','fist','brow','chin','loin','vein','bone','skin','hair','nail','wrist','ankle','elbow','thumb','calf','lobe','pore','scalp','skull','spine','chest','belly','navel','thigh','shoulder','forearm','eyelid','nostril','tongue','tooth','teeth','gum','cheek','temple','forehead','muscle','tendon','ligament','cartilage','marrow']) },
    'Magic':      { color: '#5b21b6', text: '#ede9fe', words: new Set(['spell','rune','hex','curse','charm','ritual','potion','wrath','soul','aura','omen','oracle','relic','ward','seal','glyph','tome','scroll','sigil','mana','arcane','enchant','mystic','magic','wizard','witch','warlock','sorcerer','shaman','druid','cleric','mage','conjure','summon','banish','invoke','dispel','divine','sacred','spirit','ghost','wraith','specter','demon','devil','angel','amulet','talisman','totem','idol','effigy','altar','shrine','temple','crypt','vault','nexus','vortex','portal','rift','ether','eldritch','occult','esoteric','ethereal','spectral','supernatural']) },
    'Nature':     { color: '#065f46', text: '#d1fae5', words: new Set(['tree','rock','water','fire','earth','wind','storm','cloud','rain','snow','ice','frost','mist','fog','smoke','ash','dust','sand','clay','mud','peat','coal','wood','bark','leaf','root','seed','spore','pollen','moss','fern','vine','thorn','bramble','nettle','thistle','clover','grass','reed','rush','heather','gorse','river','stream','brook','creek','pond','lake','sea','ocean','bay','gulf','inlet','fjord','delta','estuary','marsh','swamp','bog','fen','moor','heath','plain','prairie','steppe','jungle','forest','grove','copse','thicket','mountain','hill','valley','canyon','gorge','ravine','cliff','crag','peak','summit','ridge','plateau','mesa','dune','glacier','volcano','crater','geyser','spring','waterfall','cascade']) },
  };

  const wordToCategory = {};
  for (const [name, data] of Object.entries(CATEGORIES)) {
    for (const w of data.words) wordToCategory[w] = name;
  }

  async function loadWordList() {
    try {
      const res = await fetch('https://raw.githubusercontent.com/FarukIb/word-unscrambler/main/dictionary.txt');
      if (!res.ok) throw new Error();
      const text = await res.text();
      wordList = text.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length >= 2);
      wordSet   = new Set(wordList);
      document.getElementById('globalLoader').style.display = 'none';
      onWordListReady();
    } catch {
      document.getElementById('globalLoader').innerHTML = '<span style="color:#f87171">Failed to load word list. Refresh to retry.</span>';
    }
  }

  function onWordListReady() {
    // Scramble
    document.getElementById('statusText').textContent = `Ready — ${wordList.length.toLocaleString()} words loaded.`;
    updateFindBtn();
    // Word Guess
    document.getElementById('wgSubmit').disabled = false;
    document.getElementById('wgNew').disabled = false;
    document.getElementById('wgHintBtn').disabled = false;
    initWordGuess();
    // Letter Blocks
    document.getElementById('lbNew').disabled = false;
    document.getElementById('lbSubmit').disabled = false;
    document.getElementById('lbSuggestBtn').disabled = false;
    initLetterBlocks();
  }

  // ═══════════════════════════════════════════════════════════
  //  MODE SWITCHING
  // ═══════════════════════════════════════════════════════════
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('mode-' + tab.dataset.mode).classList.add('active');
    });
  });

  // ═══════════════════════════════════════════════════════════
  //  SCRAMBLE MODE
  // ═══════════════════════════════════════════════════════════
  const scrInput    = document.getElementById('letterInput');
  const findBtn     = document.getElementById('findBtn');
  const clearBtn    = document.getElementById('clearBtn');
  const tilesEl     = document.getElementById('tiles');
  const statusText  = document.getElementById('statusText');
  const errorMsg    = document.getElementById('errorMsg');
  const resultsWrapper   = document.getElementById('resultsWrapper');
  const resultsContainer = document.getElementById('resultsContainer');
  const totalBadge  = document.getElementById('totalBadge');
  const filterBar   = document.getElementById('filterBar');

  let lastWords    = [];
  let activeFilter = 'All';

  scrInput.addEventListener('input', () => {
    const val = scrInput.value.replace(/[^a-zA-Z]/g, '').slice(0, 16);
    scrInput.value = val;
    renderTiles(val);
    updateFindBtn();
    errorMsg.textContent = '';
  });

  scrInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !findBtn.disabled) findBtn.click(); });

  clearBtn.addEventListener('click', () => {
    scrInput.value = '';
    renderTiles('');
    errorMsg.textContent = '';
    resultsWrapper.style.display = 'none';
    activeFilter = 'All';
    updateFindBtn();
    statusText.textContent = wordList ? `Ready — ${wordList.length.toLocaleString()} words loaded.` : 'Loading…';
    scrInput.focus();
  });

  function renderTiles(str) {
    tilesEl.innerHTML = '';
    for (const ch of str.toUpperCase()) {
      const t = document.createElement('div');
      t.className = 'tile' + (ch === 'Q' ? ' tile-qu' : '');
      t.textContent = ch === 'Q' ? 'QU' : ch;
      tilesEl.appendChild(t);
    }
  }

  function updateFindBtn() {
    findBtn.disabled = !wordList || scrInput.value.trim().length < 1;
  }

  function canForm(word, letterCounts) {
    const need = {};
    for (const ch of word) {
      need[ch] = (need[ch] || 0) + 1;
      if (need[ch] > (letterCounts[ch] || 0)) return false;
    }
    return true;
  }

  function findWords(letters) {
    const lc = letters.toLowerCase();
    const counts = {};
    for (const ch of lc) {
      counts[ch] = (counts[ch] || 0) + 1;
      if (ch === 'q') counts['u'] = (counts['u'] || 0) + 1;
    }
    const maxLen = lc.length + (counts['q'] || 0);
    const results = [];
    for (const word of wordList) {
      if (word.length < 2 || word.length > maxLen) continue;
      if (canForm(word, counts)) results.push(word);
    }
    return results;
  }

  function renderFilterBar(words) {
    filterBar.innerHTML = '';
    const present = new Set(words.map(w => wordToCategory[w]).filter(Boolean));
    if (present.size === 0) return;
    const cats = ['All', ...Object.keys(CATEGORIES).filter(c => present.has(c))];
    for (const cat of cats) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === activeFilter ? ' active' : '');
      btn.textContent = cat;
      if (cat === 'All' && activeFilter === 'All') {
        btn.style.background = 'linear-gradient(135deg,#38bdf8,#818cf8)';
        btn.style.color = '#0f172a';
      } else if (cat !== 'All' && activeFilter === cat) {
        btn.style.background = CATEGORIES[cat].color;
      }
      btn.addEventListener('click', () => { activeFilter = cat; renderFilterBar(lastWords); renderWordGroups(lastWords); });
      filterBar.appendChild(btn);
    }
  }

  function renderWordGroups(words) {
    resultsContainer.innerHTML = '';
    const filtered = activeFilter === 'All' ? words : words.filter(w => wordToCategory[w] === activeFilter);
    if (filtered.length === 0) {
      resultsContainer.innerHTML = '<div class="empty-state">No words in this category.</div>';
      return;
    }
    const groups = {};
    for (const w of filtered) (groups[w.length] = groups[w.length] || []).push(w);
    for (const len of Object.keys(groups).map(Number).sort((a,b) => b-a)) {
      const group = groups[len].sort();
      const div = document.createElement('div');
      div.className = 'length-group';
      const header = document.createElement('div');
      header.className = 'length-header';
      header.innerHTML = `<span class="length-label">${len}-letter words</span><div style="display:flex;align-items:center;gap:.75rem"><span class="length-count">${group.length} word${group.length!==1?'s':''}</span><span class="chevron">▼</span></div>`;
      header.addEventListener('click', () => div.classList.toggle('collapsed'));
      const grid = document.createElement('div');
      grid.className = 'word-grid';
      for (const w of group) {
        const chip = document.createElement('div');
        chip.className = 'word-chip';
        chip.textContent = w;
        const cat = wordToCategory[w];
        if (cat) {
          const tag = document.createElement('span');
          tag.className = 'cat-tag';
          tag.textContent = cat;
          tag.style.background = CATEGORIES[cat].color;
          tag.style.color = CATEGORIES[cat].text;
          chip.appendChild(tag);
        }
        grid.appendChild(chip);
      }
      div.appendChild(header);
      div.appendChild(grid);
      resultsContainer.appendChild(div);
    }
  }

  function renderResults(words) {
    lastWords = words;
    activeFilter = 'All';
    if (words.length === 0) {
      resultsWrapper.style.display = 'block';
      filterBar.innerHTML = '';
      totalBadge.textContent = '0 words';
      resultsContainer.innerHTML = '<div class="empty-state">No valid words found.<br>Try different letters.</div>';
      return;
    }
    totalBadge.textContent = `${words.length.toLocaleString()} word${words.length!==1?'s':''}`;
    resultsWrapper.style.display = 'block';
    renderFilterBar(words);
    renderWordGroups(words);
  }

  findBtn.addEventListener('click', () => {
    const letters = scrInput.value.trim();
    if (!letters || !wordList) return;
    if (!/^[a-zA-Z]+$/.test(letters)) { errorMsg.textContent = 'Only letters A–Z are allowed.'; return; }
    findBtn.disabled = true;
    findBtn.textContent = 'Searching…';
    statusText.textContent = '';
    resultsWrapper.style.display = 'none';
    setTimeout(() => {
      const t0 = performance.now();
      const words = findWords(letters);
      const ms = (performance.now() - t0).toFixed(0);
      renderResults(words);
      statusText.innerHTML = words.length > 0
        ? `Found <span class="highlight">${words.length.toLocaleString()} words</span> in ${ms}ms.`
        : `No words found in ${ms}ms.`;
      findBtn.textContent = 'Find Words';
      updateFindBtn();
    }, 30);
  });

  // ═══════════════════════════════════════════════════════════
  //  WORD GUESS MODE (Wordle)
  // ═══════════════════════════════════════════════════════════
  const WG_ROWS = 6;
  const WG_COLS = 5;
  let wgAnswer   = '';
  let wgGuesses  = [];
  let wgDone     = false;
  let wgCurrentRow = 0;

  const wgGrid    = document.getElementById('wgGrid');
  const wgInput   = document.getElementById('wgInput');
  const wgSubmit  = document.getElementById('wgSubmit');
  const wgNew     = document.getElementById('wgNew');
  const wgMessage = document.getElementById('wgMessage');

  function initWordGuess() {
    const five = wordList.filter(w => w.length === 5);
    wgAnswer  = five[Math.floor(Math.random() * five.length)];
    wgGuesses = [];
    wgDone    = false;
    wgCurrentRow = 0;
    wgMessage.textContent = '';
    wgMessage.className   = 'wg-message';
    wgInput.value = '';
    wgInput.disabled = false;
    buildWGGrid();
  }

  function buildWGGrid() {
    wgGrid.innerHTML = '';
    for (let r = 0; r < WG_ROWS; r++) {
      const row = document.createElement('div');
      row.className = 'wg-row';
      row.id = `wg-row-${r}`;
      for (let c = 0; c < WG_COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'wg-cell';
        cell.id = `wg-${r}-${c}`;
        row.appendChild(cell);
      }
      wgGrid.appendChild(row);
    }
  }

  function getLetterStates(guess, answer) {
    const states = Array(WG_COLS).fill('absent');
    const pool   = {};
    for (let i = 0; i < WG_COLS; i++) {
      if (guess[i] === answer[i]) states[i] = 'correct';
      else pool[answer[i]] = (pool[answer[i]] || 0) + 1;
    }
    for (let i = 0; i < WG_COLS; i++) {
      if (states[i] !== 'correct' && pool[guess[i]] > 0) {
        states[i] = 'present';
        pool[guess[i]]--;
      }
    }
    return states;
  }

  function revealRow(row, guess, states) {
    for (let c = 0; c < WG_COLS; c++) {
      const cell = document.getElementById(`wg-${row}-${c}`);
      setTimeout(() => {
        cell.textContent = guess[c].toUpperCase();
        cell.className = `wg-cell ${states[c]}`;
      }, c * 120);
    }
  }

  wgInput.addEventListener('input', () => {
    wgInput.value = wgInput.value.replace(/[^a-zA-Z]/g,'').slice(0, WG_COLS).toUpperCase();
    // Live-preview current row
    for (let c = 0; c < WG_COLS; c++) {
      const cell = document.getElementById(`wg-${wgCurrentRow}-${c}`);
      if (!cell) continue;
      cell.textContent = wgInput.value[c] || '';
      cell.className = 'wg-cell' + (wgInput.value[c] ? ' filled' : '');
    }
  });

  wgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !wgSubmit.disabled) wgSubmit.click(); });

  function submitWGGuess() {
    if (wgDone) return;
    const guess = wgInput.value.toLowerCase();
    if (guess.length !== WG_COLS) { shakeRow(wgCurrentRow); return; }
    if (!wordSet.has(guess)) {
      wgMessage.textContent = 'Not a valid word';
      wgMessage.className = 'wg-message info';
      shakeRow(wgCurrentRow);
      return;
    }
    wgMessage.textContent = '';
    const states = getLetterStates(guess, wgAnswer);
    revealRow(wgCurrentRow, guess, states);
    wgGuesses.push(guess);
    wgCurrentRow++;
    wgInput.value = '';

    setTimeout(() => {
      if (guess === wgAnswer) {
        wgDone = true;
        wgMessage.textContent = ['Genius!','Excellent!','Great!','Good!','Nice!','Phew!'][wgCurrentRow - 1] || 'Got it!';
        wgMessage.className = 'wg-message win';
        wgInput.disabled = true;
      } else if (wgCurrentRow >= WG_ROWS) {
        wgDone = true;
        wgMessage.textContent = `The word was: ${wgAnswer.toUpperCase()}`;
        wgMessage.className = 'wg-message lose';
        wgInput.disabled = true;
      }
    }, WG_COLS * 120 + 100);
  }

  function shakeRow(row) {
    const el = document.getElementById(`wg-row-${row}`);
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
  }

  wgSubmit.addEventListener('click', submitWGGuess);
  wgNew.addEventListener('click', initWordGuess);

  // ── Word Guess solver ────────────────────────────────────────
  const wgHintBtn   = document.getElementById('wgHintBtn');
  const wgHintPanel = document.getElementById('wgHintPanel');
  const wgHintCount = document.getElementById('wgHintCount');
  const wgHintWord  = document.getElementById('wgHintWord');

  function getWGCandidates() {
    const mustBeAt    = {};      // pos -> letter
    const mustContain = {};      // letter -> Set<pos> where it must NOT be
    const minCount    = {};      // letter -> minimum occurrences
    const maxCount    = {};      // letter -> maximum occurrences

    for (const guess of wgGuesses) {
      const states = getLetterStates(guess, wgAnswer);
      const seen = {};
      for (let i = 0; i < WG_COLS; i++) {
        const ch = guess[i];
        seen[ch] = (seen[ch] || 0) + 1;
        if (states[i] === 'correct') {
          mustBeAt[i] = ch;
          minCount[ch] = Math.max(minCount[ch] || 0, seen[ch]);
        } else if (states[i] === 'present') {
          if (!mustContain[ch]) mustContain[ch] = new Set();
          mustContain[ch].add(i);
          minCount[ch] = Math.max(minCount[ch] || 0, seen[ch]);
        } else {
          maxCount[ch] = seen[ch] - 1;
        }
      }
    }

    return wordList.filter(w => {
      if (w.length !== 5) return false;
      if (wgGuesses.includes(w)) return false;
      for (const [pos, ch] of Object.entries(mustBeAt)) if (w[pos] !== ch) return false;
      for (const [ch, notPos] of Object.entries(mustContain)) {
        if (!w.includes(ch)) return false;
        for (const p of notPos) if (w[p] === ch) return false;
      }
      for (const [ch, min] of Object.entries(minCount)) {
        if (w.split('').filter(c => c === ch).length < min) return false;
      }
      for (const [ch, max] of Object.entries(maxCount)) {
        if (w.split('').filter(c => c === ch).length > max) return false;
      }
      return true;
    });
  }

  function showWGHint() {
    const candidates = getWGCandidates();
    if (candidates.length === 0) {
      wgHintCount.textContent = 'No candidates found.';
      wgHintWord.textContent  = '';
    } else {
      // Pick a candidate that maximises coverage of unseen letters
      const seenLetters = new Set(wgGuesses.join(''));
      const pick = candidates.find(w => w.split('').some(c => !seenLetters.has(c))) || candidates[0];
      wgHintCount.textContent = `${candidates.length} possible word${candidates.length !== 1 ? 's' : ''} remaining`;
      wgHintWord.textContent  = pick.toUpperCase();
    }
    wgHintPanel.classList.add('show');
  }

  wgHintBtn.addEventListener('click', showWGHint);

  // Enable hint button once word list is ready (patched into onWordListReady)
  const _origOnReady = onWordListReady;
  // (hint btn enabled inside onWordListReady below via wgNew.disabled = false)

  // ═══════════════════════════════════════════════════════════
  //  LETTER BLOCKS MODE
  // ═══════════════════════════════════════════════════════════
  const LETTER_POOL = 'aaaaaaaaabbccddddeeeeeeeeeeeeffggghhiiiiiiiiijkllllmmnnnnnnooooooooppqrrrrrrssssttttttuuuuvvwwxyyz'.split('');

  let lbTiles      = [];  // [{letter, used}]
  let lbFoundWords = new Set();
  let lbScore      = 0;

  const lbTilesEl  = document.getElementById('lbTiles');
  const lbInput    = document.getElementById('lbInput');
  const lbSubmitEl = document.getElementById('lbSubmit');
  const lbNewEl    = document.getElementById('lbNew');
  const lbMessageEl= document.getElementById('lbMessage');
  const lbFoundEl  = document.getElementById('lbFound');
  const lbScoreEl  = document.getElementById('lbScore');

  function generateLBTiles() {
    const pool = [...LETTER_POOL];
    // Shuffle pool
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    let tiles = pool.slice(0, 25).map(l => ({ letter: l, used: false }));
    // Ensure at least 7 vowels
    const vowels = 'aeiou';
    let vCount = tiles.filter(t => vowels.includes(t.letter)).length;
    while (vCount < 7) {
      const idx = tiles.findIndex(t => !vowels.includes(t.letter));
      if (idx === -1) break;
      const v = vowels[Math.floor(Math.random() * 5)];
      tiles[idx] = { letter: v, used: false };
      vCount++;
    }
    return tiles;
  }

  function initLetterBlocks() {
    lbTiles      = generateLBTiles();
    lbFoundWords = new Set();
    lbScore      = 0;
    lbInput.value   = '';
    lbInput.disabled = false;
    lbMessageEl.textContent = '';
    lbMessageEl.className   = 'lb-message';
    lbFoundEl.innerHTML     = '';
    lbScoreEl.innerHTML     = '0 <span>pts</span>';
    renderLBTiles();
  }

  function renderLBTiles() {
    lbTilesEl.innerHTML = '';
    for (const t of lbTiles) {
      const div = document.createElement('div');
      const isQU = t.letter === 'q';
      div.className = 'lb-tile' + (t.used ? ' used' : '') + (isQU ? ' qu' : '');
      div.textContent = isQU ? 'QU' : t.letter.toUpperCase();
      lbTilesEl.appendChild(div);
    }
  }

  function lbCanForm(word) {
    const avail = {};
    for (const t of lbTiles) {
      if (!t.used) {
        avail[t.letter] = (avail[t.letter] || 0) + 1;
        if (t.letter === 'q') avail['u'] = (avail['u'] || 0) + 1;
      }
    }
    for (const ch of word) {
      if (!avail[ch]) return false;
      avail[ch]--;
    }
    return true;
  }

  function lbUseTiles(word) {
    const letters = word.split('');
    for (const ch of letters) {
      // For 'u' that came from 'q', mark the q tile used first
      if (ch === 'u') {
        const qIdx = lbTiles.findIndex(t => !t.used && t.letter === 'q');
        if (qIdx !== -1) {
          lbTiles[qIdx].used = true;
          continue;
        }
      }
      const idx = lbTiles.findIndex(t => !t.used && t.letter === ch);
      if (idx !== -1) lbTiles[idx].used = true;
    }
  }

  function submitLBWord() {
    const word = lbInput.value.toLowerCase().trim();
    lbInput.value = '';
    if (word.length < 2) return;
    if (lbFoundWords.has(word)) {
      lbMessageEl.textContent = `Already found "${word}"`;
      lbMessageEl.className = 'lb-message bad';
      return;
    }
    if (!wordSet.has(word)) {
      lbMessageEl.textContent = `"${word.toUpperCase()}" is not a valid word`;
      lbMessageEl.className = 'lb-message bad';
      return;
    }
    if (!lbCanForm(word)) {
      lbMessageEl.textContent = `Can't spell "${word.toUpperCase()}" with available tiles`;
      lbMessageEl.className = 'lb-message bad';
      return;
    }

    lbUseTiles(word);
    lbFoundWords.add(word);
    const pts = word.length;
    lbScore += pts;

    lbScoreEl.innerHTML = `${lbScore} <span>pts</span>`;
    lbMessageEl.textContent = `+${pts} pts — ${word.toUpperCase()}`;
    lbMessageEl.className = 'lb-message good';

    // Add chip to found words
    const chip = document.createElement('div');
    chip.className = 'lb-word-chip';
    chip.innerHTML = `${word} <span class="lb-pts">+${pts}</span>`;
    lbFoundEl.prepend(chip);

    renderLBTiles();
  }

  lbInput.addEventListener('input', () => {
    lbInput.value = lbInput.value.replace(/[^a-zA-Z]/g,'').toUpperCase();
  });
  lbInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitLBWord(); });
  lbSubmitEl.addEventListener('click', submitLBWord);
  lbNewEl.addEventListener('click', initLetterBlocks);

  // ── Letter Blocks suggest ────────────────────────────────────
  const lbSuggestBtn    = document.getElementById('lbSuggestBtn');
  const lbSuggestPanel  = document.getElementById('lbSuggestPanel');
  const lbSuggestCount  = document.getElementById('lbSuggestCount');
  const lbSuggestGroups = document.getElementById('lbSuggestGroups');
  const lbSuggestClose  = document.getElementById('lbSuggestClose');

  function showLBSuggestions() {
    const words = [];
    for (const word of wordList) {
      if (word.length < 2) continue;
      if (lbFoundWords.has(word)) continue;
      if (lbCanForm(word)) words.push(word);
    }
    words.sort((a, b) => b.length - a.length || a.localeCompare(b));

    lbSuggestGroups.innerHTML = '';
    if (words.length === 0) {
      lbSuggestCount.textContent = 'No words possible with remaining tiles';
      lbSuggestPanel.classList.add('show');
      return;
    }

    lbSuggestCount.textContent = `${words.length} possible word${words.length !== 1 ? 's' : ''}`;

    // Group by length, show top 8 lengths max
    const groups = {};
    for (const w of words) (groups[w.length] = groups[w.length] || []).push(w);
    const lengths = Object.keys(groups).map(Number).sort((a, b) => b - a).slice(0, 8);

    for (const len of lengths) {
      const row = document.createElement('div');
      row.className = 'lb-suggest-row';
      const lenLabel = document.createElement('span');
      lenLabel.className = 'lb-suggest-len';
      lenLabel.textContent = len;
      row.appendChild(lenLabel);
      // Show up to 12 words per length
      for (const w of groups[len].slice(0, 12)) {
        const chip = document.createElement('span');
        chip.className = 'lb-suggest-chip';
        chip.textContent = w;
        chip.addEventListener('click', () => {
          lbInput.value = w.toUpperCase();
          lbInput.focus();
          lbSuggestPanel.classList.remove('show');
        });
        row.appendChild(chip);
      }
      if (groups[len].length > 12) {
        const more = document.createElement('span');
        more.style.cssText = 'font-size:0.72rem;color:#475569;';
        more.textContent = `+${groups[len].length - 12} more`;
        row.appendChild(more);
      }
      lbSuggestGroups.appendChild(row);
    }

    lbSuggestPanel.classList.add('show');
  }

  lbSuggestBtn.addEventListener('click', showLBSuggestions);
  lbSuggestClose.addEventListener('click', () => lbSuggestPanel.classList.remove('show'));

  // ── Init ──────────────────────────────────────────────────
  loadWordList();

  // ═══════════════════════════════════════════════════════════
  //  SCAN / OCR
  // ═══════════════════════════════════════════════════════════
  const scanOverlay  = document.getElementById('scanOverlay');
  const scanTitle    = document.getElementById('scanTitle');
  const scanPreview  = document.getElementById('scanPreview');
  const scanStatus   = document.getElementById('scanStatus');
  const scanLetters  = document.getElementById('scanLetters');
  const scanCancel   = document.getElementById('scanCancel');
  const scanApply    = document.getElementById('scanApply');
  const scrCamInput  = document.getElementById('scrCamInput');
  const lbCamInput   = document.getElementById('lbCamInput');

  let scanTarget = 'scramble'; // 'scramble' | 'letterblocks'
  let tesseractWorker = null;

  async function getTesseract() {
    if (tesseractWorker) return tesseractWorker;
    scanStatus.textContent = 'Loading OCR engine…';
    tesseractWorker = await Tesseract.createWorker('eng');
    await tesseractWorker.setParameters({
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      tessedit_pageseg_mode: '11',
    });
    return tesseractWorker;
  }

  function openScanModal(target) {
    scanTarget = target;
    scanTitle.textContent = target === 'scramble' ? 'Scan Letters (up to 16)' : 'Scan Tiles (25)';
    scanPreview.classList.remove('show');
    scanPreview.src = '';
    scanLetters.value = '';
    scanStatus.textContent = 'Choose an image to scan.';
    scanStatus.className = 'scan-status';
    scanApply.disabled = true;
    scanOverlay.classList.add('open');
    // Open file picker immediately
    if (target === 'scramble') scrCamInput.click();
    else lbCamInput.click();
  }

  async function runOCR(file) {
    const url = URL.createObjectURL(file);
    scanPreview.src = url;
    scanPreview.classList.add('show');
    scanStatus.textContent = 'Running OCR…';
    scanStatus.className = 'scan-status';
    scanApply.disabled = true;

    try {
      const worker = await getTesseract();
      const { data: { text } } = await worker.recognize(file);
      URL.revokeObjectURL(url);

      const letters = text.replace(/[^A-Za-z]/g, '').toUpperCase();
      const limit   = scanTarget === 'scramble' ? 16 : 25;
      const result  = letters.slice(0, limit);

      if (result.length === 0) {
        scanStatus.textContent = 'No letters detected — try a clearer photo.';
        scanStatus.className = 'scan-status err';
        return;
      }

      scanLetters.value = result;
      scanStatus.textContent = `Detected ${result.length} letter${result.length !== 1 ? 's' : ''}. Edit if needed, then Apply.`;
      scanStatus.className = 'scan-status ok';
      scanApply.disabled = false;
    } catch (e) {
      scanStatus.textContent = 'OCR failed. Try a clearer photo.';
      scanStatus.className = 'scan-status err';
    }
  }

  function applyScan() {
    const letters = scanLetters.value.replace(/[^A-Za-z]/g, '').toUpperCase();
    if (!letters) return;

    if (scanTarget === 'scramble') {
      scrInput.value = letters.slice(0, 16);
      scrInput.dispatchEvent(new Event('input'));
    } else {
      // Build Letter Blocks tiles from scanned letters, pad/trim to 25
      let arr = letters.split('').slice(0, 25);
      while (arr.length < 25) {
        const fill = LETTER_POOL[Math.floor(Math.random() * LETTER_POOL.length)];
        arr.push(fill.toUpperCase());
      }
      lbTiles = arr.map(l => ({ letter: l.toLowerCase(), used: false }));
      lbFoundWords = new Set();
      lbScore = 0;
      lbInput.value = '';
      lbMessageEl.textContent = '';
      lbFoundEl.innerHTML = '';
      lbScoreEl.innerHTML = '0 <span>pts</span>';
      renderLBTiles();
    }

    closeScanModal();
    scrCamInput.value = '';
    lbCamInput.value  = '';
  }

  function closeScanModal() {
    scanOverlay.classList.remove('open');
  }

  // Wire up file inputs
  scrCamInput.addEventListener('change', e => { if (e.target.files[0]) runOCR(e.target.files[0]); });
  lbCamInput.addEventListener('change',  e => { if (e.target.files[0]) runOCR(e.target.files[0]); });

  // Wire up buttons
  document.getElementById('scrScan').addEventListener('click', () => openScanModal('scramble'));
  document.getElementById('lbScan').addEventListener('click',  () => openScanModal('letterblocks'));
  scanCancel.addEventListener('click', closeScanModal);
  scanApply.addEventListener('click',  applyScan);
  scanLetters.addEventListener('input', () => {
    scanLetters.value = scanLetters.value.replace(/[^A-Za-z]/g, '').toUpperCase();
    scanApply.disabled = scanLetters.value.length === 0;
  });
  // Close on backdrop click
  scanOverlay.addEventListener('click', e => { if (e.target === scanOverlay) closeScanModal(); });
</script>
</body>
</html>
