<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scramble Word Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 1.75rem;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .letter-input {
      flex: 1;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 0.6rem;
      padding: 0.75rem 1rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #f0f9ff;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }

    .letter-input:focus { border-color: #38bdf8; }

    .letter-input::placeholder {
      color: #334155;
      font-weight: 400;
      letter-spacing: 0.05em;
      font-size: 1rem;
    }

    .btn {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 0.6rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-clear {
      background: #334155;
      color: #94a3b8;
      padding: 0.75rem 0.9rem;
      font-size: 1.1rem;
    }

    .char-tiles {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
      min-height: 2.5rem;
    }

    .tile {
      background: linear-gradient(135deg, #1d4ed8, #6d28d9);
      border-radius: 0.4rem;
      width: 2.4rem;
      height: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      animation: pop 0.15s ease;
    }

    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .status-bar {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #64748b;
      min-height: 1.2em;
    }

    .status-bar .highlight { color: #38bdf8; font-weight: 600; }

    .loader {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results-wrapper {
      width: 100%;
      max-width: 640px;
      margin-top: 1.5rem;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .results-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .total-badge {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.8rem;
      color: #38bdf8;
      font-weight: 700;
    }

    /* Category filter bar */
    .filter-bar {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.85rem;
    }

    .filter-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: #64748b; color: #e2e8f0; }
    .filter-btn.active { color: #fff; border-color: transparent; }

    /* Category tag on word chips */
    .cat-tag {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 700;
      padding: 0.1rem 0.3rem;
      border-radius: 0.2rem;
      margin-left: 0.3rem;
      vertical-align: middle;
      letter-spacing: 0.02em;
      opacity: 0.9;
    }

    .length-group {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .length-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      background: #0f172a;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .length-header:hover { background: #172033; }

    .length-label {
      font-weight: 700;
      font-size: 0.9rem;
      color: #818cf8;
    }

    .length-count {
      font-size: 0.78rem;
      color: #64748b;
    }

    .chevron {
      font-size: 0.7rem;
      color: #475569;
      transition: transform 0.2s;
    }

    .length-group.collapsed .chevron { transform: rotate(-90deg); }
    .length-group.collapsed .word-grid { display: none; }

    .word-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
    }

    .word-chip {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.4rem;
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #cbd5e1;
      letter-spacing: 0.04em;
      transition: border-color 0.15s, color 0.15s;
      cursor: default;
      display: flex;
      align-items: center;
    }

    .word-chip:hover { border-color: #818cf8; color: #a5b4fc; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #475569;
      font-size: 0.9rem;
    }

    .error-msg {
      color: #f87171;
      font-size: 0.82rem;
      margin-top: 0.4rem;
    }

    footer {
      margin-top: 2rem;
      color: #334155;
      font-size: 0.75rem;
      text-align: center;
    }

    @media (max-width: 500px) {
      body { padding: 1.25rem 0.75rem; }

      h1 { font-size: 1.5rem; }

      .subtitle { margin-bottom: 1.25rem; }

      .card { padding: 1rem; }

      .input-row { flex-wrap: wrap; }

      .letter-input {
        order: 1;
        font-size: 1.2rem;
        padding: 0.65rem 0.75rem;
      }

      .btn-clear { order: 2; }

      #findBtn {
        order: 3;
        width: 100%;
        padding: 0.8rem;
        font-size: 1rem;
      }

      .tile {
        width: 2rem;
        height: 2rem;
        font-size: 0.95rem;
      }

      .word-chip { font-size: 0.9rem; padding: 0.35rem 0.65rem; }

      .results-wrapper { margin-top: 1rem; }
    }
  </style>
</head>
<body>

<h1>SCRAMBLE</h1>
<p class="subtitle">Find every valid word hiding in your letters</p>

<div class="card">
  <div class="input-row">
    <input
      id="letterInput"
      class="letter-input"
      type="text"
      maxlength="16"
      placeholder="Enter up to 16 letters…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button class="btn" id="findBtn" disabled>Find Words</button>
    <button class="btn btn-clear" id="clearBtn" title="Clear">✕</button>
  </div>

  <div class="char-tiles" id="tiles"></div>
  <div id="errorMsg" class="error-msg"></div>

  <div class="status-bar" id="statusBar">
    <span id="statusText">Enter letters above to begin.</span>
  </div>

  <div id="loaderRow" class="loader" style="display:none;">
    <div class="spinner"></div>
    <span id="loaderText">Loading word list…</span>
  </div>
</div>

<div class="results-wrapper" id="resultsWrapper" style="display:none;">
  <div class="results-header">
    <h2>Found Words</h2>
    <span class="total-badge" id="totalBadge">0 words</span>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div id="resultsContainer"></div>
</div>

<footer>Word list: Bookworm Adventures · Minimum word length: 2</footer>

<script>
  const input    = document.getElementById('letterInput');
  const findBtn  = document.getElementById('findBtn');
  const clearBtn = document.getElementById('clearBtn');
  const tilesEl  = document.getElementById('tiles');
  const statusText = document.getElementById('statusText');
  const loaderRow  = document.getElementById('loaderRow');
  const loaderText = document.getElementById('loaderText');
  const errorMsg   = document.getElementById('errorMsg');
  const resultsWrapper   = document.getElementById('resultsWrapper');
  const resultsContainer = document.getElementById('resultsContainer');
  const totalBadge = document.getElementById('totalBadge');
  const filterBar  = document.getElementById('filterBar');

  let wordList    = null;
  let loading     = false;
  let lastWords   = [];
  let activeFilter = 'All';

  // ── Word categories ──────────────────────────────────────────────────────────
  const CATEGORIES = {
    'Metals':     { color: '#475569', text: '#e2e8f0', words: new Set([
      'gold','silver','iron','steel','copper','bronze','tin','lead','zinc',
      'nickel','cobalt','chrome','brass','pewter','platinum','titanium',
      'alloy','ore','rust','foil','nail','bolt','rivet','ingot','solder',
      'mercury','barium','radium','cesium','iridium','osmium','bismuth',
      'indium','gallium','cerium','hafnium','terbium','erbium','holmium',
      'thulium','lutetium','scandium','vanadium','chromium','manganese',
      'germanium','selenium','cadmium','antimony','tellurium','xenon',
      'metal','metals','metallic'
    ])},
    'Gems':       { color: '#7e22ce', text: '#ede9fe', words: new Set([
      'ruby','diamond','emerald','sapphire','topaz','opal','pearl','garnet',
      'amber','jade','crystal','gem','jewel','agate','onyx','beryl',
      'amethyst','quartz','zircon','spinel','tourmaline','peridot','citrine',
      'jasper','chalcedony','moonstone','sunstone','tanzanite','aquamarine',
      'alexandrite','gems','jewels','gemstone'
    ])},
    'Animals':    { color: '#15803d', text: '#dcfce7', words: new Set([
      'cat','dog','bird','fish','bear','wolf','lion','tiger','eagle','snake',
      'deer','fox','owl','crow','rat','bat','ant','bee','fly','bug','crab',
      'frog','toad','duck','hen','cow','pig','ram','ewe','elk','ape','asp',
      'eel','cod','colt','mare','boar','bull','stag','swan','hawk','wren',
      'dove','mole','vole','newt','wasp','moth','lark','seal','worm','slug',
      'clam','snail','hare','lynx','puma','bison','moose','raven','crane',
      'finch','robin','quail','trout','perch','shark','whale','squid','moth',
      'beetle','spider','lizard','turtle','parrot','monkey','rabbit','donkey',
      'horse','zebra','giraffe','leopard','panther','dolphin','penguin',
      'ostrich','peacock','vulture','sparrow','swallow','pigeon','falcon',
      'cobra','viper','python','gecko','iguana','ferret','badger','otter',
      'beaver','weasel','marten','ermine','stoat','skunk','opossum','raccoon'
    ])},
    'Colors':     { color: '#b45309', text: '#fef3c7', words: new Set([
      'red','blue','green','yellow','orange','purple','pink','black','white',
      'gray','grey','brown','cyan','teal','violet','indigo','scarlet',
      'crimson','azure','ivory','ebony','tan','rose','coral','mauve','beige',
      'cream','navy','olive','tawny','auburn','amber','ochre','sienna',
      'umber','khaki','lilac','maroon','magenta','turquoise','lavender',
      'chartreuse','vermilion','cobalt','cerulean','fuchsia','chartreuse'
    ])},
    'Weapons':    { color: '#b91c1c', text: '#fee2e2', words: new Set([
      'sword','blade','axe','bow','spear','lance','mace','dagger','knife',
      'staff','club','dart','arrow','sling','whip','flail','pike','halberd',
      'rapier','saber','scythe','trident','javelin','crossbow','glaive',
      'cleaver','cutlass','falchion','broadsword','shortsword','longbow',
      'sickle','baton','cudgel','stiletto','dirk','machete','katana','wakizashi',
      'naginata','shuriken','kunai','tomahawk','hatchet','warhammer','maul',
      'mortar','cannon','pistol','musket','rifle','blade','shield','buckler'
    ])},
    'Food':       { color: '#c2410c', text: '#fff7ed', words: new Set([
      'bread','meat','cake','pie','rice','corn','bean','pea','nut','egg',
      'milk','ale','wine','salt','herb','root','fruit','berry','plum','pear',
      'lime','fig','date','oat','rye','tart','stew','soup','broth','cream',
      'butter','honey','jam','ham','beef','pork','lamb','veal','lard','suet',
      'flour','yeast','sugar','syrup','sauce','gravy','spice','pepper','ginger',
      'garlic','onion','leek','carrot','turnip','radish','celery','parsley',
      'basil','thyme','sage','mint','dill','cumin','turmeric','cinnamon',
      'nutmeg','clove','anise','fennel','apple','grape','lemon','orange',
      'mango','peach','melon','cherry','strawberry','blueberry','raspberry',
      'fish','prawn','shrimp','lobster','oyster','mussel','clam','squid',
      'pasta','noodle','dumpling','biscuit','cracker','pretzel','wafer',
      'candy','toffee','fudge','caramel','chocolate','vanilla','custard',
      'pudding','jelly','yogurt','cheese','bacon','sausage','meatball'
    ])},
    'Body Parts': { color: '#1d4ed8', text: '#dbeafe', words: new Set([
      'arm','leg','head','hand','foot','eye','ear','nose','lip','rib','hip',
      'jaw','toe','shin','knee','back','neck','heel','palm','fist','brow',
      'chin','loin','vein','bone','skin','hair','nail','wrist','ankle',
      'elbow','thumb','calf','lobe','pore','scalp','skull','spine','pelvis',
      'chest','belly','navel','groin','thigh','kneecap','shoulder','forearm',
      'eyelid','eyelash','eyebrow','nostril','eardrum','tonsil','tongue',
      'tooth','teeth','gum','cheek','temple','forehead','occiput','trachea',
      'larynx','pharynx','esophagus','stomach','intestine','colon','rectum',
      'liver','kidney','spleen','pancreas','gallbladder','bladder','uterus',
      'ovary','testicle','prostate','thyroid','adrenal','pituitary','pineal',
      'muscle','tendon','ligament','cartilage','marrow','plasma','serum'
    ])},
    'Magic':      { color: '#5b21b6', text: '#ede9fe', words: new Set([
      'spell','rune','hex','curse','charm','ritual','potion','wrath','soul',
      'aura','omen','oracle','relic','ward','seal','glyph','tome','scroll',
      'sigil','mana','arcane','enchant','mystic','magic','wizard','witch',
      'warlock','sorcerer','shaman','druid','cleric','mage','conjure','summon',
      'banish','invoke','dispel','ward','bind','curse','bless','smite',
      'divine','sacred','profane','unholy','spirit','ghost','wraith','specter',
      'demon','devil','angel','divine','heaven','hell','limbo','purgatory',
      'amulet','talisman','totem','idol','effigy','fetish','icon','relic',
      'altar','shrine','temple','sanctum','crypt','vault','nexus','vortex',
      'portal','rift','ley','ether','aether','astral','ethereal','spectral',
      'eldritch','occult','esoteric','arcane','mystical','supernatural'
    ])},
    'Nature':     { color: '#065f46', text: '#d1fae5', words: new Set([
      'tree','rock','water','fire','earth','wind','storm','cloud','rain',
      'snow','ice','frost','mist','fog','smoke','ash','dust','sand','clay',
      'mud','peat','coal','wood','bark','leaf','root','seed','spore','pollen',
      'moss','fern','vine','thorn','bramble','nettle','thistle','clover',
      'grass','reed','rush','sedge','heather','bracken','gorse','furze',
      'river','stream','brook','creek','pond','lake','sea','ocean','bay',
      'gulf','inlet','fjord','delta','estuary','marsh','swamp','bog','fen',
      'moor','heath','plain','prairie','steppe','savanna','jungle','forest',
      'grove','copse','thicket','scrub','brush','undergrowth','canopy',
      'mountain','hill','valley','canyon','gorge','ravine','cliff','crag',
      'peak','summit','ridge','plateau','mesa','butte','dune','glacier',
      'volcano','crater','geyser','spring','waterfall','cascade','rapids'
    ])},
  };

  // Build reverse lookup: word → category name
  const wordToCategory = {};
  for (const [name, data] of Object.entries(CATEGORIES)) {
    for (const w of data.words) wordToCategory[w] = name;
  }

  // ── Load word list ───────────────────────────────────────────────────────────
  async function loadWordList() {
    loading = true;
    loaderRow.style.display = 'flex';
    loaderText.textContent  = 'Loading word list…';
    statusText.textContent  = '';

    try {
      const url = 'https://raw.githubusercontent.com/FarukIb/word-unscrambler/main/dictionary.txt';
      const res = await fetch(url);
      if (!res.ok) throw new Error('Network error');
      const text = await res.text();
      wordList = text.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length >= 2);
      loaderRow.style.display = 'none';
      statusText.textContent  = `Ready — ${wordList.length.toLocaleString()} words loaded.`;
      updateFindBtn();
    } catch (e) {
      loaderRow.style.display = 'none';
      statusText.innerHTML = '<span style="color:#f87171">Failed to load word list. Check your internet connection and refresh.</span>';
    }
    loading = false;
  }

  // ── Input handling ───────────────────────────────────────────────────────────
  input.addEventListener('input', () => {
    const val = input.value.replace(/[^a-zA-Z]/g, '').slice(0, 16);
    input.value = val;
    renderTiles(val);
    updateFindBtn();
    errorMsg.textContent = '';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !findBtn.disabled) findBtn.click();
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    renderTiles('');
    errorMsg.textContent = '';
    resultsWrapper.style.display = 'none';
    activeFilter = 'All';
    updateFindBtn();
    statusText.textContent = wordList
      ? `Ready — ${wordList.length.toLocaleString()} words loaded.`
      : 'Enter letters above to begin.';
    input.focus();
  });

  function renderTiles(str) {
    tilesEl.innerHTML = '';
    for (const ch of str.toUpperCase()) {
      const t = document.createElement('div');
      t.className = 'tile';
      t.textContent = ch;
      tilesEl.appendChild(t);
    }
  }

  function updateFindBtn() {
    findBtn.disabled = !wordList || input.value.trim().length < 1 || loading;
  }

  // ── Core algorithm ───────────────────────────────────────────────────────────
  function canForm(word, letterCounts) {
    const need = {};
    for (const ch of word) {
      need[ch] = (need[ch] || 0) + 1;
      if ((need[ch] || 0) > (letterCounts[ch] || 0)) return false;
    }
    return true;
  }

  function findWords(letters) {
    const lc = letters.toLowerCase();
    const counts = {};
    for (const ch of lc) counts[ch] = (counts[ch] || 0) + 1;
    const maxLen = lc.length;
    const results = [];
    for (const word of wordList) {
      if (word.length < 2 || word.length > maxLen) continue;
      if (canForm(word, counts)) results.push(word);
    }
    return results;
  }

  // ── Filter bar ───────────────────────────────────────────────────────────────
  function renderFilterBar(words) {
    filterBar.innerHTML = '';
    // Find which categories appear in the results
    const present = new Set(words.map(w => wordToCategory[w]).filter(Boolean));
    if (present.size === 0) return;

    const cats = ['All', ...Object.keys(CATEGORIES).filter(c => present.has(c))];

    for (const cat of cats) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === activeFilter ? ' active' : '');
      btn.textContent = cat === 'All' ? 'All' : `${cat}`;

      if (cat !== 'All') {
        const data = CATEGORIES[cat];
        if (activeFilter === cat) {
          btn.style.background = data.color;
        }
      } else if (activeFilter === 'All') {
        btn.style.background = 'linear-gradient(135deg, #38bdf8, #818cf8)';
        btn.style.color = '#0f172a';
      }

      btn.addEventListener('click', () => {
        activeFilter = cat;
        renderFilterBar(lastWords);
        renderWordGroups(lastWords);
      });

      filterBar.appendChild(btn);
    }
  }

  // ── Render results ───────────────────────────────────────────────────────────
  function renderWordGroups(words) {
    resultsContainer.innerHTML = '';

    const filtered = activeFilter === 'All'
      ? words
      : words.filter(w => wordToCategory[w] === activeFilter);

    if (filtered.length === 0) {
      resultsContainer.innerHTML = '<div class="empty-state">No words in this category.<br>Try a different filter.</div>';
      return;
    }

    const groups = {};
    for (const w of filtered) {
      (groups[w.length] = groups[w.length] || []).push(w);
    }

    const lengths = Object.keys(groups).map(Number).sort((a, b) => b - a);

    for (const len of lengths) {
      const group = groups[len].sort();
      const div = document.createElement('div');
      div.className = 'length-group';

      const header = document.createElement('div');
      header.className = 'length-header';
      header.innerHTML = `
        <span class="length-label">${len}-letter words</span>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <span class="length-count">${group.length} word${group.length !== 1 ? 's' : ''}</span>
          <span class="chevron">▼</span>
        </div>`;
      header.addEventListener('click', () => div.classList.toggle('collapsed'));

      const grid = document.createElement('div');
      grid.className = 'word-grid';

      for (const w of group) {
        const chip = document.createElement('div');
        chip.className = 'word-chip';
        chip.textContent = w;

        const cat = wordToCategory[w];
        if (cat) {
          const tag = document.createElement('span');
          tag.className = 'cat-tag';
          tag.textContent = cat;
          tag.style.background = CATEGORIES[cat].color;
          tag.style.color = CATEGORIES[cat].text;
          chip.appendChild(tag);
        }

        grid.appendChild(chip);
      }

      div.appendChild(header);
      div.appendChild(grid);
      resultsContainer.appendChild(div);
    }
  }

  function renderResults(words) {
    lastWords = words;
    activeFilter = 'All';
    resultsContainer.innerHTML = '';

    if (words.length === 0) {
      resultsWrapper.style.display = 'block';
      filterBar.innerHTML = '';
      totalBadge.textContent = '0 words';
      resultsContainer.innerHTML = '<div class="empty-state">No valid words found.<br>Try different letters.</div>';
      return;
    }

    totalBadge.textContent = `${words.length.toLocaleString()} word${words.length !== 1 ? 's' : ''}`;
    resultsWrapper.style.display = 'block';
    renderFilterBar(words);
    renderWordGroups(words);
  }

  // ── Find button ──────────────────────────────────────────────────────────────
  findBtn.addEventListener('click', () => {
    const letters = input.value.trim();
    if (!letters || !wordList) return;

    if (!/^[a-zA-Z]+$/.test(letters)) {
      errorMsg.textContent = 'Only letters A–Z are allowed.';
      return;
    }

    findBtn.disabled = true;
    findBtn.textContent = 'Searching…';
    statusText.textContent = '';
    resultsWrapper.style.display = 'none';

    setTimeout(() => {
      const t0 = performance.now();
      const words = findWords(letters);
      const ms = (performance.now() - t0).toFixed(0);

      renderResults(words);
      statusText.innerHTML = words.length > 0
        ? `Found <span class="highlight">${words.length.toLocaleString()} words</span> in ${ms}ms.`
        : `No words found in ${ms}ms.`;

      findBtn.textContent = 'Find Words';
      updateFindBtn();
    }, 30);
  });

  // ── Init ─────────────────────────────────────────────────────────────────────
  loadWordList();
</script>
</body>
</html>
